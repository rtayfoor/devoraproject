<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Ormidia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #E30613;
            --primary-dark: #b80510;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-container {
            background: white;
            border-radius: var(--radius);
            padding: 3rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }
        .login-header .logo span { color: #1e293b; }
        .login-header h1 {
            font-size: 1.5rem;
            color: #1e293b;
            margin-top: 0.5rem;
        }
        .login-header p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e293b;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(227,6,19,0.1);
        }
        .form-group .input-icon {
            position: relative;
        }
        .form-group .input-icon i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .form-group .input-icon input {
            padding-left: 2.8rem;
        }
        .btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        .alert.show { display: flex; }
        .alert.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .alert.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .security-badge {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .security-badge i {
            margin-right: 0.25rem;
        }
        @media (max-width: 480px) {
            .login-container { padding: 2rem; }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <div class="logo">Ormidia <span>CA</span></div>
        <h1>🔒 Admin Login</h1>
        <p>Enter your admin credentials to access the database</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="adminLoginForm">
        <div class="form-group">
            <label>Username</label>
            <div class="input-icon">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Enter admin username" required autocomplete="username">
            </div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="input-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Enter admin password" required autocomplete="current-password">
            </div>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
    </form>

    <div class="security-badge">
        <i class="fas fa-shield-alt"></i> Secure admin access only
    </div>
</div>

<script>
    (function() {
        const loginForm = document.getElementById('adminLoginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const alertDiv = document.getElementById('alert');

        function showAlert(message, type = 'error') {
            alertDiv.textContent = message;
            alertDiv.className = `alert show ${type}`;
        }

        function hideAlert() {
            alertDiv.className = 'alert';
        }

        // Check if already logged in
        async function checkExistingSession() {
            const token = localStorage.getItem('admin_token');
            if (!token) return;
            
            try {
                const response = await fetch('/api/admin/verify', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                if (data.authenticated) {
                    window.location.href = 'database-admin.html';
                } else {
                    localStorage.removeItem('admin_token');
                    localStorage.removeItem('admin_user');
                }
            } catch (e) {
                localStorage.removeItem('admin_token');
                localStorage.removeItem('admin_user');
            }
        }

        // Run session check on load
        checkExistingSession();

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            hideAlert();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                showAlert('Please enter both username and password.');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Invalid credentials');
                }

                localStorage.setItem('admin_token', data.token);
                localStorage.setItem('admin_user', JSON.stringify({
                    username: data.username,
                    loggedIn: true
                }));

                showAlert('Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = 'database-admin.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showAlert(error.message || 'Login failed. Please try again.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });

        usernameInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loginForm.dispatchEvent(new Event('submit'));
        });
        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') loginForm.dispatchEvent(new Event('submit'));
        });
    })();
</script>
</body>
</html>
