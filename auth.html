<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Ormidia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-container {
            background: white;
            border-radius: 12px;
            padding: 3rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-container .logo-text {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #E30613;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .auth-container .logo-text .logo-icon {
            width: 40px;
            height: 40px;
            background: #E30613;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        .auth-container .logo-text span { color: #1e293b; }
        .auth-container h1 {
            font-size: 1.5rem;
            color: #1e293b;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .auth-container p {
            color: #64748b;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        .tabs {
            display: flex;
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 1.5rem;
        }
        .tab {
            flex: 1;
            padding: 0.75rem;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #94a3b8;
            border-bottom: 3px solid transparent;
        }
        .tab.active {
            color: #E30613;
            border-bottom-color: #E30613;
        }
        .tab:hover { color: #1e293b; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
            color: #1e293b;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #E30613;
            box-shadow: 0 0 0 3px rgba(227,6,19,0.1);
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 3rem;
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .password-toggle:hover { color: #E30613; }
        .btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: #E30613;
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background: #b80510;
            transform: translateY(-2px);
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary {
            background: #f1f5f9;
            color: #1e293b;
        }
        .btn-secondary:hover { background: #e2e8f0; }
        .message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }
        .message.error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .message.success { display: block; background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .message.info { display: block; background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .forgot-link {
            display: block;
            text-align: right;
            margin-top: 0.25rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s ease;
        }
        .forgot-link:hover { color: #E30613; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #64748b;
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #E30613; }
        .back-link i { margin-right: 0.25rem; }
        .debug-info {
            margin-top: 1rem;
            padding: 0.75rem;
            background: #f8fafc;
            border-radius: 8px;
            font-size: 0.75rem;
            color: #64748b;
            font-family: monospace;
            word-break: break-all;
            display: none;
        }
        .debug-info.show { display: block; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo-text">
        <div class="logo-icon">🚗</div>
        Ormidia <span>CA</span>
    </div>
    <h1>Welcome Back</h1>
    <p>Sign in to access your account</p>

    <div id="message" class="message"></div>

    <div class="tabs">
        <div class="tab active" data-tab="login">Sign In</div>
        <div class="tab" data-tab="register">Create Account</div>
    </div>

    <!-- Login Tab -->
    <div id="tab-login" class="tab-content active">
        <form id="loginForm" autocomplete="on">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <a href="#" class="forgot-link" onclick="showForgotPassword()">Forgot password?</a>
            <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
        </form>
    </div>

    <!-- Register Tab -->
    <div id="tab-register" class="tab-content">
        <form id="registerForm" autocomplete="on">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="registerName" placeholder="John Doe" required autocomplete="name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="registerEmail" placeholder="your@email.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="registerPassword" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
                    <button type="button" class="password-toggle" onclick="togglePassword('registerPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
        </form>
    </div>

    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    
    <!-- Debug Info -->
    <div id="debugInfo" class="debug-info">
        <strong>Debug Info:</strong><br>
        <span id="debugText">Loading...</span>
    </div>
    <button onclick="toggleDebug()" style="margin-top:0.5rem;background:none;border:none;color:#94a3b8;font-size:0.75rem;cursor:pointer;text-decoration:underline;">Toggle Debug</button>
</div>

<!-- Forgot Password Modal -->
<div id="forgotModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:white;border-radius:12px;padding:2rem;max-width:400px;width:90%;">
        <h3 style="margin-bottom:0.5rem;">Reset Password</h3>
        <p style="color:#64748b;margin-bottom:1rem;">Enter your email and we'll send you a reset link.</p>
        <input type="email" id="forgotEmail" placeholder="your@email.com" style="width:100%;padding:0.75rem;border:2px solid #e2e8f0;border-radius:8px;margin-bottom:1rem;font-family:inherit;">
        <div style="display:flex;gap:0.5rem;">
            <button onclick="closeForgotPassword()" class="btn btn-secondary" style="flex:1;">Cancel</button>
            <button onclick="resetPassword()" class="btn btn-primary" style="flex:2;">Send Reset Link</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ==========================================
        // SUPABASE CONFIG - Hardcoded for reliability
        // ==========================================
        const SUPABASE_URL = 'https://gyeyxvfwhsbbhnjwlgbx.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_nSWYIf67QX6O78By4H3SMQ_YCi28s1S';
        
        let supabase = null;
        let supabaseInitialized = false;

        console.log('🔐 Auth page loaded');
        console.log('📡 Supabase URL:', SUPABASE_URL);
        console.log('🔑 Supabase Key:', SUPABASE_ANON_KEY ? '✅ Present' : '❌ Missing');

        // ==========================================
        // GET SUPABASE CLIENT - DIRECT NO FETCH
        // ==========================================
        function getSupabaseClient() {
            if (supabase) return supabase;
            if (supabaseInitialized) return supabase;

            try {
                if (typeof window.supabase === 'undefined') {
                    console.error('❌ Supabase library not loaded');
                    showMessage('Failed to load Supabase library. Please refresh.', 'error');
                    return null;
                }

                if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
                    console.error('❌ Missing Supabase credentials');
                    showMessage('Configuration error. Please try again.', 'error');
                    return null;
                }

                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                supabaseInitialized = true;
                console.log('✅ Supabase client created successfully');
                
                // Update debug
                updateDebug('Supabase client created');
                
                return supabase;
            } catch (e) {
                console.error('❌ Failed to create Supabase client:', e);
                showMessage('Failed to connect. Please try again.', 'error');
                return null;
            }
        }

        // ==========================================
        // DEBUG
        // ==========================================
        function updateDebug(text) {
            const el = document.getElementById('debugText');
            if (el) {
                el.textContent = text + ' | ' + new Date().toLocaleTimeString();
            }
        }

        window.toggleDebug = function() {
            document.getElementById('debugInfo').classList.toggle('show');
        };

        // ==========================================
        // TOGGLE PASSWORD VISIBILITY
        // ==========================================
        window.togglePassword = function(inputId) {
            const input = document.getElementById(inputId);
            if (!input) return;
            const toggle = input.parentElement.querySelector('.password-toggle i');
            if (input.type === 'password') {
                input.type = 'text';
                if (toggle) toggle.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                if (toggle) toggle.className = 'fas fa-eye';
            }
        };

        // ==========================================
        // SHOW MESSAGE
        // ==========================================
        function showMessage(text, type = 'error') {
            const el = document.getElementById('message');
            if (!el) return;
            el.className = `message ${type}`;
            el.textContent = text;
            console.log(`📩 ${type.toUpperCase()}: ${text}`);
            
            // Auto-hide after 6 seconds
            clearTimeout(el._timeout);
            el._timeout = setTimeout(() => {
                if (el.className === `message ${type}`) {
                    el.className = 'message';
                }
            }, 6000);
        }

        // ==========================================
        // TABS
        // ==========================================
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(`tab-${this.dataset.tab}`).classList.add('active');
                document.getElementById('message').className = 'message';
            });
        });

        // ==========================================
        // TEST SUPABASE CONNECTION
        // ==========================================
        async function testSupabaseConnection() {
            try {
                const client = getSupabaseClient();
                if (!client) {
                    showMessage('❌ Cannot connect to database', 'error');
                    return false;
                }

                // Simple test query
                const { data, error } = await client
                    .from('users')
                    .select('count', { count: 'exact', head: true });

                if (error) {
                    console.warn('⚠️ Test query failed:', error);
                    // If table doesn't exist, that's okay - we can still auth
                    if (error.code === '42P01') {
                        showMessage('✅ Database connected (users table not found yet)', 'info');
                        return true;
                    }
                    showMessage('⚠️ Database connection issue: ' + error.message, 'error');
                    return false;
                }

                console.log('✅ Database connection test passed');
                showMessage('✅ Connected to database', 'success');
                return true;
            } catch (e) {
                console.error('❌ Connection test failed:', e);
                return false;
            }
        }

        // ==========================================
        // LOGIN
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                showMessage('Please enter email and password', 'error');
                return;
            }

            // Validate email format
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            updateDebug(`Attempting login for: ${email}`);

            try {
                const client = getSupabaseClient();
                if (!client) {
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In';
                    return;
                }

                console.log('🔑 Attempting login for:', email);

                const { data, error } = await client.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    console.error('❌ Auth error:', error);
                    updateDebug(`Auth error: ${error.message} (${error.status || 'unknown'})`);
                    
                    // Handle specific error types
                    if (error.message.includes('Invalid login credentials')) {
                        showMessage('❌ Invalid email or password. Please try again.', 'error');
                    } else if (error.message.includes('Email not confirmed')) {
                        showMessage('📧 Please check your email and confirm your account first.', 'info');
                    } else if (error.message.includes('rate limit')) {
                        showMessage('⏳ Too many attempts. Please wait a few minutes.', 'error');
                    } else if (error.message.includes('network')) {
                        showMessage('🌐 Network error. Please check your connection.', 'error');
                    } else {
                        showMessage('❌ ' + error.message, 'error');
                    }
                    
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In';
                    return;
                }

                if (data?.user) {
                    console.log('✅ Login successful for:', data.user.email);
                    updateDebug(`Login successful: ${data.user.email}`);
                    
                    // Store user in localStorage
                    const user = {
                        id: data.user.id,
                        email: data.user.email,
                        name: data.user.user_metadata?.name || email.split('@')[0]
                    };
                    
                    // Try to get user profile
                    try {
                        const { data: userData, error: userError } = await client
                            .from('users')
                            .select('*')
                            .eq('id', data.user.id)
                            .single();
                        
                        if (!userError && userData) {
                            localStorage.setItem('user', JSON.stringify(userData));
                            console.log('✅ User profile loaded');
                        } else {
                            localStorage.setItem('user', JSON.stringify(user));
                            console.log('⚠️ No user profile, using basic info');
                        }
                    } catch (e) {
                        localStorage.setItem('user', JSON.stringify(user));
                    }

                    showMessage('✅ Login successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showMessage('❌ Login failed. No user data returned.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In';
                }
            } catch (error) {
                console.error('❌ Login error:', error);
                updateDebug(`Login error: ${error.message}`);
                showMessage('❌ Login failed. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        });

        // ==========================================
        // REGISTER
        // ==========================================
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            const btn = document.getElementById('registerBtn');

            if (!name || !email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';

            try {
                const client = getSupabaseClient();
                if (!client) {
                    btn.disabled = false;
                    btn.innerHTML = 'Create Account';
                    return;
                }

                console.log('📝 Attempting signup for:', email);

                const { data, error } = await client.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            name: name
                        }
                    }
                });

                if (error) {
                    console.error('❌ Signup error:', error);
                    
                    if (error.message.includes('already registered')) {
                        showMessage('❌ This email is already registered. Please sign in.', 'error');
                    } else {
                        showMessage('❌ ' + error.message, 'error');
                    }
                    btn.disabled = false;
                    btn.innerHTML = 'Create Account';
                    return;
                }

                if (data?.user) {
                    console.log('✅ Signup successful for:', data.user.email);
                    
                    // Create user profile
                    try {
                        const { error: insertError } = await client
                            .from('users')
                            .insert([{
                                id: data.user.id,
                                name: name,
                                email: email
                            }]);

                        if (insertError) {
                            console.warn('⚠️ Could not create user profile:', insertError);
                        } else {
                            console.log('✅ User profile created');
                        }
                    } catch (e) {
                        console.warn('⚠️ Profile creation error:', e);
                    }

                    showMessage('✅ Account created! Please check your email to confirm.', 'success');
                    
                    // Switch to login tab after 2 seconds
                    setTimeout(() => {
                        document.querySelector('.tab[data-tab="login"]').click();
                        document.getElementById('loginEmail').value = email;
                    }, 2000);
                    
                    btn.disabled = false;
                    btn.innerHTML = 'Create Account';
                    document.getElementById('registerForm').reset();
                } else {
                    showMessage('❌ Signup failed. Please try again.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Create Account';
                }
            } catch (error) {
                console.error('❌ Signup error:', error);
                showMessage('❌ Signup failed. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            }
        });

        // ==========================================
        // FORGOT PASSWORD
        // ==========================================
        window.showForgotPassword = function(e) {
            if (e) e.preventDefault();
            document.getElementById('forgotModal').style.display = 'flex';
            document.getElementById('forgotEmail').value = document.getElementById('loginEmail').value || '';
        };

        window.closeForgotPassword = function() {
            document.getElementById('forgotModal').style.display = 'none';
        };

        window.resetPassword = async function() {
            const email = document.getElementById('forgotEmail').value.trim();
            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const result = await response.json();
                
                if (response.ok) {
                    showMessage('✅ Password reset link sent to your email!', 'success');
                    closeForgotPassword();
                } else {
                    showMessage('❌ ' + (result.error || 'Failed to send reset link'), 'error');
                }
            } catch (error) {
                console.error('Reset password error:', error);
                showMessage('❌ Failed to send reset link. Please try again.', 'error');
            }
        };

        // ==========================================
        // ENTER KEY SUPPORT
        // ==========================================
        document.getElementById('loginEmail').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
        document.getElementById('loginPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });

        // ==========================================
        // CLOSE MODAL ON ESC
        // ==========================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeForgotPassword();
            }
        });

        // ==========================================
        // CLOSE MODAL ON CLICK OUTSIDE
        // ==========================================
        document.getElementById('forgotModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeForgotPassword();
            }
        });

        // ==========================================
        // INITIALIZE
        // ==========================================
        console.log('🔐 Auth page initialized');
        
        // Test connection on load
        setTimeout(() => {
            testSupabaseConnection();
        }, 500);

        updateDebug('Auth page ready');
    })();
</script>
</body>
</html>
