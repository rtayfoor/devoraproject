<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Ormidia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .reset-container {
            background: white;
            border-radius: 12px;
            padding: 3rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .reset-container .logo {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #E30613;
            margin-bottom: 0.5rem;
        }
        .reset-container .logo span { color: #1e293b; }
        .reset-container h1 {
            font-size: 1.8rem;
            color: #1e293b;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .reset-container p {
            color: #64748b;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
            color: #1e293b;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #E30613;
            box-shadow: 0 0 0 3px rgba(227,6,19,0.1);
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 3rem;
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.25rem;
        }
        .password-toggle:hover { color: #E30613; }
        .btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: #E30613;
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background: #b80510;
            transform: translateY(-2px);
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }
        .message.error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .message.success { display: block; background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #64748b;
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #E30613; }
        .back-link i { margin-right: 0.25rem; }
        .validity-check {
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: center;
            margin-top: 0.5rem;
        }
        .validity-check i { margin-right: 0.25rem; }
    </style>
</head>
<body>

<div class="reset-container">
    <div class="logo">Ormidia <span>CA</span></div>
    <h1>Set New Password</h1>
    <p>Enter your new password below.</p>

    <div id="message" class="message"></div>

    <form id="resetForm">
        <div class="form-group">
            <label>New Password</label>
            <div class="password-wrapper">
                <input type="password" id="newPassword" placeholder="Enter new password" required minlength="6">
                <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-wrapper">
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" id="resetBtn">Update Password</button>
    </form>

    <div class="validity-check">
        <i class="fas fa-clock"></i> Reset link expires in 1 hour
    </div>

    <a href="auth.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
</div>

<script>
    (function() {
        // ==========================================
        // GET SUPABASE CLIENT
        // ==========================================
        let supabase = null;
        let supabaseInitialized = false;

        async function getSupabaseClient() {
            if (supabase) return supabase;
            if (supabaseInitialized) return supabase;

            try {
                const response = await fetch('/api/supabase/config');
                if (!response.ok) throw new Error(`Server returned ${response.status}`);
                const config = await response.json();
                if (!config.supabaseUrl || !config.supabaseAnonKey) {
                    throw new Error('Missing Supabase credentials');
                }
                if (window.supabase) {
                    supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
                    supabaseInitialized = true;
                }
                return supabase;
            } catch (e) {
                console.error('Failed to get Supabase client:', e);
                supabaseInitialized = true;
                return null;
            }
        }

        // ==========================================
        // TOGGLE PASSWORD VISIBILITY
        // ==========================================
        window.togglePassword = function(inputId) {
            const input = document.getElementById(inputId);
            const toggle = input.parentElement.querySelector('.password-toggle i');
            if (input.type === 'password') {
                input.type = 'text';
                toggle.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                toggle.className = 'fas fa-eye';
            }
        };

        // ==========================================
        // GET TOKEN AND EMAIL FROM URL
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');
        const resetEmail = urlParams.get('email');

        // If no token, redirect to login
        if (!resetToken || !resetEmail) {
            window.location.href = 'auth.html';
        }

        console.log('🔑 Reset token found for:', resetEmail);

        // ==========================================
        // HANDLE RESET FORM SUBMISSION
        // ==========================================
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const messageEl = document.getElementById('message');
            const btn = document.getElementById('resetBtn');

            // Validate passwords match
            if (password !== confirm) {
                messageEl.className = 'message error';
                messageEl.textContent = '❌ Passwords do not match.';
                return;
            }

            // Validate password length
            if (password.length < 6) {
                messageEl.className = 'message error';
                messageEl.textContent = '❌ Password must be at least 6 characters.';
                return;
            }

            // Show loading state
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            try {
                // Send request to server to verify token and update password
                const response = await fetch('/api/auth/verify-reset-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token: resetToken, 
                        email: resetEmail,
                        password: password 
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error || 'Failed to update password');
                }

                // Success
                messageEl.className = 'message success';
                messageEl.textContent = '✅ Password updated successfully! Redirecting to login...';
                btn.disabled = true;

                // Redirect after 2.5 seconds
                setTimeout(() => {
                    window.location.href = 'auth.html';
                }, 2500);

            } catch (error) {
                console.error('Reset error:', error);
                messageEl.className = 'message error';
                messageEl.textContent = '❌ ' + (error.message || 'Failed to update password. The link may have expired.');
                btn.disabled = false;
                btn.innerHTML = 'Update Password';
            }
        });

        // ==========================================
        // ENTER KEY SUPPORT FOR FORM
        // ==========================================
        document.getElementById('newPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('resetForm').dispatchEvent(new Event('submit'));
            }
        });
        document.getElementById('confirmPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('resetForm').dispatchEvent(new Event('submit'));
            }
        });

    })();
</script>
</body>
</html>
